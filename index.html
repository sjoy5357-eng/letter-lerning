<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter & Number Tracing Game</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6445719442687092"
         crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .current-item {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 20px;
        }

        .section-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .section-btn {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #666;
        }

        .section-btn.active {
            background: #4ecdc4;
            color: white;
            border-color: #4ecdc4;
            transform: scale(1.05);
        }

        .section-btn:hover:not(.active) {
            background: #f8f9fa;
            border-color: #4ecdc4;
            transform: translateY(-2px);
        }

        #tracingCanvas {
            border: 3px solid #ddd;
            border-radius: 15px;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            background: white;
            touch-action: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
        }

        .btn-clear:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-next {
            background: #4ecdc4;
            color: white;
        }

        .btn-next:hover {
            background: #45b7aa;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }

        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .success-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: bounceIn 0.5s ease;
            max-width: 90vw;
        }

        .success-title {
            font-size: 3rem;
            color: #4ecdc4;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }

        .success-message {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 30px;
        }

        .btn-success-next {
            background: #2ecc71;
            color: white;
            padding: 20px 40px;
            font-size: 1.5rem;
        }

        .btn-success-next:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            color: #ffd700;
            font-size: 2rem;
            animation: starFloat 2s ease-in-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes starFloat {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .brush-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            background: rgba(78, 205, 196, 0.9);
            color: white;
            border-radius: 20px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .title { font-size: 2rem; }
            .current-item { font-size: 1.2rem; }
            .btn { padding: 12px 20px; font-size: 1rem; }
            .success-title { font-size: 2rem; }
            .success-message { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">✨ Trace the Letter! ✨</h1>
            <div class="section-selector">
                <button class="section-btn active" id="lettersBtn" data-section="letters">🔤 Letters</button>
                <button class="section-btn" id="numbersBtn" data-section="numbers">🔢 Numbers</button>
            </div>
            <div class="current-item" id="currentItem">Trace: A</div>
        </div>
        
        <canvas id="tracingCanvas" width="600" height="400"></canvas>
        
        <div class="brush-indicator" id="brushIndicator">🎨 Blue Brush</div>
        
        <div class="controls">
            <button class="btn btn-clear" id="clearBtn">🧹 Clear</button>
            <button class="btn btn-next" id="skipBtn">⏭️ Skip</button>
        </div>
    </div>

    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="stars" id="starsContainer"></div>
            <div class="success-title">⭐⭐⭐</div>
            <div class="success-message">Very Good!</div>
            <button class="btn btn-success-next" id="successNextBtn">🌟 Next</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
